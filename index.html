<!DOCTYPE html>
<html lang="pt-br">

<head>


    <!-- Titulo -->
    <title>Progress Bar</title>
    <!-- Titulo -->

    <!-- Meta arquivos -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=7">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="keywords" content="card, blog pessoal, informação">
    <meta name="description" content="meu card pessoal feito especialmente para projeto, 01 projeto">
    <meta name="author" content="Samuel Pacheco Falcão Rodrigues">
    <meta name="robots" content="index, follow">
    <!-- Meta arquivos -->

    <!-- font cloudflare 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Link css -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Link css -->

</head>

<body>
    <div class="container">
        <div class="skill-box">
            <span class="title">HTML</span>
            <div class="skill-bar">
                <span class="skill-per html">
                    <span class="tooltip">90%</span>
                </span>
            </div>
        </div>

        <div class="skill-box">
            <span class="title">CSS</span>
            <div class="skill-bar">
                <span class="skill-per css">
                    <span class="tooltip">70%</span>
                </span>
            </div>
        </div>

        <div class="skill-box">
            <span class="title">JavaScript</span>
            <div class="skill-bar">
                <span class="skill-per javascript">
                    <span class="tooltip">10%</span>
                </span>
            </div>
        </div>

        <div class="skill-box">
            <span class="title">C#</span>
            <div class="skill-bar">
                <span class="skill-per c">
                    <span class="tooltip">0%</span>
                </span>
            </div>
        </div>


    </div>

</body>

</html>
